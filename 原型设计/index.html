<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>单机版仿真数据管理工具</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #f1f5f9;
      --text: #17202a;
      --muted: #657386;
      --line: #d8e0ea;
      --strong-line: #aeb9c6;
      --blue: #276ef1;
      --blue-soft: #e8f0ff;
      --green: #168a4a;
      --green-soft: #e6f6ed;
      --amber: #b26a00;
      --amber-soft: #fff1d6;
      --red: #c73b3b;
      --red-soft: #ffe7e7;
      --gray-soft: #edf0f4;
      --ink: #1d2939;
      --shadow: 0 16px 42px rgba(24, 39, 75, 0.08);
      --radius: 8px;
      font-family: Inter, "SF Pro Display", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-width: 1200px;
      margin: 0;
      color: var(--text);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      user-select: none;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .brand {
      min-width: 360px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      background: var(--ink);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions,
    .toolbar-left,
    .button-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      width: 300px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .search span {
      color: var(--muted);
      font-weight: 800;
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
    }

    .layout {
      height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 272px minmax(760px, 1fr) 340px;
      gap: 12px;
      padding: 12px;
    }

    .sidebar,
    .workspace,
    .detail {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sidebar,
    .detail {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .workspace {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) 172px;
    }

    .panel-head,
    .toolbar,
    .compare-head {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .panel-head {
      padding: 13px 14px;
    }

    .panel-head h2,
    .detail h2,
    .compare-head h3,
    .toolbar-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .sidebar-body,
    .detail-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .toolbar {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
    }

    .segmented {
      display: flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .segmented button,
    .tabbar button {
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
    }

    .segmented button {
      height: 30px;
      padding: 0 10px;
    }

    .segmented button.active,
    .tabbar button.active {
      color: var(--text);
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(24, 39, 75, 0.12);
    }

    .icon-btn,
    .primary-btn,
    .ghost-btn,
    .danger-btn {
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #ffffff;
      cursor: pointer;
      white-space: nowrap;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
      font-weight: 800;
    }

    .primary-btn {
      color: #ffffff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .danger-btn {
      color: var(--red);
      border-color: #f2b9b9;
      background: #fff8f8;
    }

    .ghost-btn:hover,
    .icon-btn:hover,
    .segmented button:hover,
    .tabbar button:hover {
      background: var(--panel-soft);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 0 10px;
      color: #344054;
      font-size: 13px;
      font-weight: 800;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 12px;
    }

    .kpi {
      min-height: 62px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .kpi span,
    .metric span,
    .stat span,
    .field-help,
    .file-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .kpi strong {
      display: block;
      margin-top: 7px;
      font-size: 18px;
      line-height: 1;
    }

    .library-list {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .library-card {
      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);
      border-radius: 8px;
      padding: 9px;
      background: #ffffff;
      cursor: grab;
    }

    .library-card:active {
      cursor: grabbing;
    }

    .library-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.35;
    }

    .library-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .mini-list {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .part-tree {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tree-root,
    .part-item {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #ffffff;
      cursor: pointer;
      text-align: left;
    }

    .part-item {
      margin-left: 14px;
      width: calc(100% - 14px);
      background: #fbfcfe;
    }

    .tree-root.active,
    .part-item.active {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .tree-icon {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .tree-label {
      min-width: 0;
    }

    .tree-label strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1.25;
    }

    .tree-label span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
    }

    .mini-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      font-size: 12px;
    }

    .mini-row strong {
      font-size: 12px;
    }

    .mini-row select {
      min-width: 82px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      background: #ffffff;
      font-size: 12px;
    }

    .badge {
      height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.green {
      color: var(--green);
      background: var(--green-soft);
    }

    .badge.blue {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .badge.amber {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .badge.red {
      color: var(--red);
      background: var(--red-soft);
    }

    .badge.gray {
      color: #53606f;
      background: var(--gray-soft);
    }

    .tree-stage {
      position: relative;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(#edf2f7 1px, transparent 1px),
        linear-gradient(90deg, #edf2f7 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .tree-stage.drop-ready {
      outline: 3px solid rgba(39, 110, 241, 0.18);
      outline-offset: -3px;
    }

    .tree-stage.create-child {
      cursor: crosshair;
      outline: 3px solid rgba(22, 138, 74, 0.18);
      outline-offset: -3px;
    }

    .tree-canvas {
      position: relative;
      min-width: 1500px;
      min-height: 980px;
      transform-origin: top left;
      transition: transform 160ms ease;
    }

    .links {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    .link {
      fill: none;
      stroke: var(--strong-line);
      stroke-width: 2;
    }

    .link.recommended {
      stroke: var(--green);
      stroke-width: 2.6;
    }

    .link-label {
      fill: #53606f;
      font-size: 11px;
      font-weight: 800;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .node {
      position: absolute;
      width: 206px;
      min-height: 126px;
      padding: 11px 11px 10px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 26px rgba(24, 39, 75, 0.1);
      cursor: pointer;
      transition: box-shadow 140ms ease, border-color 140ms ease, opacity 140ms ease;
    }

    .node:hover {
      box-shadow: 0 18px 34px rgba(24, 39, 75, 0.15);
    }

    .tree-stage.create-child .node {
      cursor: copy;
    }

    .node.dragging {
      cursor: grabbing;
      opacity: 0.86;
      box-shadow: 0 20px 42px rgba(24, 39, 75, 0.2);
    }

    .node.active {
      border-color: var(--blue);
      outline: 3px solid rgba(39, 110, 241, 0.16);
    }

    .node.pending {
      outline: 3px solid rgba(22, 138, 74, 0.22);
    }

    .node.dimmed {
      opacity: 0.24;
    }

    .node.recommended {
      border-left-color: var(--green);
    }

    .node.failed {
      border-left-color: var(--red);
    }

    .node.running {
      border-left-color: var(--amber);
    }

    .node.archived {
      border-left-color: #7c8794;
    }

    .node-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .node-code {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .node-title {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 800;
    }

    .node-check {
      width: 18px;
      height: 18px;
      accent-color: var(--blue);
      flex: 0 0 auto;
      cursor: pointer;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      min-height: 41px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .node-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
    }

    .delta {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .compare {
      overflow: hidden;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .compare-head {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
    }

    .compare-table {
      height: 127px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      height: 36px;
      padding: 0 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--muted);
      background: #fbfcfe;
      font-weight: 800;
    }

    td.num,
    th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      min-height: 96px;
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }

    .tabbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .tabbar button {
      height: 32px;
      padding: 0 8px;
      font-size: 12px;
    }

    .selected-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0;
    }

    .selected-heading h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .selected-heading p,
    .detail-text {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .detail-section {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .detail-section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .detail-section h4 {
      margin: 0 0 10px;
      color: #344054;
      font-size: 13px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .stat {
      min-height: 64px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .stat strong {
      display: block;
      margin-top: 7px;
      font-size: 18px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .stat small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .mini-chart {
      height: 118px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 12px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .bar-wrap {
      flex: 1;
      height: 94px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .bar {
      width: 100%;
      max-width: 44px;
      min-height: 8px;
      border-radius: 6px 6px 2px 2px;
      background: var(--blue);
    }

    .bar-label {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    .kv {
      display: grid;
      gap: 8px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      font-size: 13px;
      line-height: 1.55;
    }

    .kv-row span {
      color: var(--muted);
    }

    .file-list {
      display: grid;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      font-size: 13px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      background: #ffffff;
      outline: 0;
    }

    .field textarea {
      min-height: 78px;
      resize: vertical;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(39, 110, 241, 0.14);
    }

    .template-table td,
    .template-table th {
      height: auto;
      padding: 8px;
      vertical-align: middle;
    }

    .template-table input,
    .template-table select {
      width: 100%;
      min-width: 74px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 6px 7px;
      background: #ffffff;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1260px) {
      body {
        min-width: 1080px;
      }

      .layout {
        grid-template-columns: 240px minmax(620px, 1fr) 300px;
      }

      .search {
        width: 240px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">FS</div>
        <div>
          <h1>单机版仿真数据管理工具</h1>
          <p>卡片模板 · 结果图谱 · 拖拽组装 · 本地保存</p>
        </div>
      </div>
      <div class="top-actions">
        <label class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="搜索方案、变更、结论、负责人">
        </label>
        <div class="segmented" aria-label="角色切换">
          <button class="active" type="button" data-role="simulation">仿真工程师</button>
          <button type="button" data-role="structure">结构工程师</button>
          <button type="button" data-role="admin">管理员</button>
        </div>
        <button class="ghost-btn" id="exportData" type="button">导出</button>
        <label class="ghost-btn" for="importData">导入</label>
        <input class="sr-only" id="importData" type="file" accept="application/json">
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="panel-head">
          <h2>仿真数据库</h2>
          <p>按仿真零件组织结果卡片、附件和图谱节点。</p>
        </div>
        <div class="sidebar-body">
          <div class="section-title">项目总览</div>
          <div class="kpi-grid">
            <div class="kpi"><span>图谱节点</span><strong id="kpiNodes">0</strong></div>
            <div class="kpi"><span>未布置卡片</span><strong id="kpiLibrary">0</strong></div>
            <div class="kpi"><span>最高一阶模态</span><strong id="kpiBest">0Hz</strong></div>
            <div class="kpi"><span>推荐方案</span><strong id="kpiRecommended">0</strong></div>
          </div>

          <div class="section-title">
            <span>仿真零件库</span>
            <button class="ghost-btn" id="newPart" type="button">新建零件</button>
          </div>
          <div class="part-tree" id="partTree"></div>

          <div class="section-title">
            <span>待布置卡片</span>
            <button class="primary-btn" id="newCard" type="button">新建卡片</button>

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    // === 状态规范化与持久化 ==================================================
    // 旧版本数据可能缺少模板字段、附件服务端标记或结论字段，加载时统一补齐。
    function normalizedDefaultState() {
      const fresh = clone(defaultState);
      fresh.template = normalizeTemplate(fresh.template);
      fresh.cards = fresh.cards.map(normalizeCardRecord);
      return fresh;
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) {
          return normalizedDefaultState();
        }
        const parsed = JSON.parse(saved);
        const next = {
          ...clone(defaultState),
          ...parsed,
          template: { ...clone(defaultState.template), ...(parsed.template || {}) },
          parts: Array.isArray(parsed.parts) ? parsed.parts : clone(defaultState.parts),
          cards: Array.isArray(parsed.cards) ? parsed.cards : clone(defaultState.cards),
          edges: Array.isArray(parsed.edges) ? parsed.edges : clone(defaultState.edges),
          selectedIds: Array.isArray(parsed.selectedIds) ? parsed.selectedIds : clone(defaultState.selectedIds)
        };
        next.template = normalizeTemplate(next.template);
        if (!next.parts.length) next.parts = clone(defaultState.parts);
        if (!next.activePartId) next.activePartId = "all";
        next.cards = next.cards.map(normalizeCardRecord);
        next.mode = "move";
        next.pendingConnectId = null;
        next.createChildMode = false;
        return next;
      } catch (error) {
        console.warn("Failed to load saved state", error);
        return normalizedDefaultState();
      }
    }

    function normalizeCardRecord(card) {
      const values = { ...(card.values || {}) };
      if (!Object.prototype.hasOwnProperty.call(values, "conclusion")) {
        values.conclusion = card.conclusion || "";
      }
      return {
        ...card,
        partId: card.partId || inferPartId(card),
        relationType: card.relationType || "结构迭代",
        values,
        files: Array.isArray(card.files)
          ? card.files.map((file, index) => normalizeAttachment(file, card, index))
          : []
      };
    }

    function defaultConclusionField() {
      return {
        code: "conclusion",
        name: "结果结论",
        type: "text",
        unit: "",
        required: true,
        showOnNode: false,
        detailSummary: false,
        compare: false,
        keyMetric: false,
        conclusionField: true
      };
    }

    function normalizeTemplate(template) {
      const base = clone(defaultState.template);
      const next = { ...base, ...(template || {}) };
      const sourceFields = Array.isArray(next.fields) ? next.fields : base.fields;
      const normalizedFields = sourceFields.map((field) => {
        const type = field.type === "text" ? "text" : "number";
        return {
          ...field,
          type,
          required: Boolean(field.required),
          showOnNode: Boolean(field.showOnNode),
          detailSummary: Object.prototype.hasOwnProperty.call(field, "detailSummary")
            ? Boolean(field.detailSummary)
            : Boolean(field.showOnNode),
          compare: Boolean(field.compare),
          keyMetric: type === "number" && (Object.prototype.hasOwnProperty.call(field, "keyMetric")
            ? Boolean(field.keyMetric)
            : ["first", "second", "third", "mass", "stiffness"].includes(field.code)),
          conclusionField: Object.prototype.hasOwnProperty.call(field, "conclusionField")
            ? Boolean(field.conclusionField)
            : ["conclusion", "constraint", "solver", "conclusionStatus", "suggestion", "risk"].includes(field.code)
        };
      });
      if (!normalizedFields.some((field) => field.code === "conclusion")) {
        const insertIndex = normalizedFields.findIndex((field) => field.code === "constraint");
        if (insertIndex >= 0) normalizedFields.splice(insertIndex, 0, defaultConclusionField());
        else normalizedFields.push(defaultConclusionField());
      }
      next.fields = normalizedFields;
      return next;
    }

    function inferPartId(card) {
      if (card.id === "b" || card.id === "b1") return "part-bracket";
      if (card.id === "c" || card.id === "c1" || card.id === "c2" || card.id === "draft-d") return "part-lock";
      return "part-steering";
    }

    function normalizeAttachment(file, card, index) {
      if (file && typeof file === "object") {
        const relativePath = file.relativePath || "";
        const serverStored = Boolean(file.serverStored || file.url || relativePath.startsWith("server_data/attachments/"));
        const folderName = file.folderName || attachmentFolderName(card);
        const storedName = file.storedName || file.name || file.fileName || "未命名附件";
        return {
          id: file.id || `file-${card.id}-${index}`,
          name: file.name || file.fileName || "未命名附件",
          storedName,
          folderName,
          relativePath,
          type: file.type || fileType(file.name || file.fileName || ""),
          size: Number(file.size || 0),
          uploadedAt: file.uploadedAt || "",
          legacy: Boolean(file.legacy),
          serverStored,
          url: file.url || (serverStored ? `/api/attachments/${encodeURIComponent(folderName)}/${encodeURIComponent(storedName)}` : "")
        };
      }
      const name = String(file || "未命名附件");
      return {
        id: `legacy-${card.id}-${index}-${name}`,
        name,
        storedName: name,
        folderName: "",
        relativePath: "",
        type: fileType(name),
        size: 0,
        uploadedAt: "",
        legacy: true
      };
    }

    function saveState() {
      if (serverMode) {
        scheduleServerSave();
        return;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // 服务端保存必须串行化，避免旧请求晚返回时覆盖新状态。
    function scheduleServerSave() {
      serverSaveQueued = true;
      clearTimeout(serverSaveTimer);
      serverSaveTimer = setTimeout(saveStateToServer, 250);
    }

    async function saveStateToServer() {
      if (serverSaveInFlight || !serverSaveQueued) return;
      serverSaveQueued = false;
      serverSaveInFlight = true;
      try {
        const response = await fetch("/api/state", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state)
        });
        if (!response.ok) throw new Error(`Save failed: ${response.status}`);
      } catch (error) {
        console.warn("Failed to save state to server", error);
      } finally {
        serverSaveInFlight = false;
        if (serverSaveQueued) scheduleServerSave();
      }
    }

    async function loadStateFromServer() {
      try {
        const response = await fetch("/api/state", { cache: "no-store" });
        if (!response.ok) return false;
        const payload = await response.json();
        if (!payload.state) {
          state = normalizedDefaultState();
          return true;
        }
        if (!Array.isArray(payload.state.cards)) return false;
        const next = {
          ...clone(defaultState),
          ...payload.state,
          template: { ...clone(defaultState.template), ...(payload.state.template || {}) },
          parts: Array.isArray(payload.state.parts) ? payload.state.parts : clone(defaultState.parts),
          cards: payload.state.cards,
          edges: Array.isArray(payload.state.edges) ? payload.state.edges : clone(defaultState.edges),
          selectedIds: Array.isArray(payload.state.selectedIds) ? payload.state.selectedIds : clone(defaultState.selectedIds)
        };
        next.template = normalizeTemplate(next.template);
        if (!next.parts.length) next.parts = clone(defaultState.parts);
        if (!next.activePartId) next.activePartId = "all";
        next.cards = next.cards.map(normalizeCardRecord);
        next.mode = "move";
        next.pendingConnectId = null;
        next.createChildMode = false;
        state = next;
        return true;
      } catch (error) {
        console.warn("Failed to load state from server", error);
        return false;
      }
    }

    // === 附件管理 ============================================================
    // 本地 file:// 模式复制到用户选择目录；工作站模式上传到 server_data/attachments。
    function openAttachmentDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(ATTACHMENT_DB, 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore(ATTACHMENT_STORE);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function loadAttachmentDirectoryHandle() {
      if (!("indexedDB" in window)) return;
      try {
        const db = await openAttachmentDb();
        const transaction = db.transaction(ATTACHMENT_STORE, "readonly");
        const store = transaction.objectStore(ATTACHMENT_STORE);
        const request = store.get(ATTACHMENT_HANDLE_KEY);
        attachmentRootHandle = await new Promise((resolve, reject) => {
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      } catch (error) {
        console.warn("Failed to load attachment directory handle", error);
      }
    }

    async function saveAttachmentDirectoryHandle(handle) {
      const db = await openAttachmentDb();
      const transaction = db.transaction(ATTACHMENT_STORE, "readwrite");
      transaction.objectStore(ATTACHMENT_STORE).put(handle, ATTACHMENT_HANDLE_KEY);
      await new Promise((resolve, reject) => {
        transaction.oncomplete = resolve;
        transaction.onerror = () => reject(transaction.error);
      });
    }

    async function ensureAttachmentPermission() {
      if (!attachmentRootHandle) return false;
      const options = { mode: "readwrite" };
      if ((await attachmentRootHandle.queryPermission(options)) === "granted") return true;
      return (await attachmentRootHandle.requestPermission(options)) === "granted";
    }

    async function chooseAttachmentDirectory() {
      if (serverMode) {
        alert("当前为工作站服务器模式，附件会统一保存到工作站 server_data/attachments 目录。");
        return;
      }
      if (!("showDirectoryPicker" in window)) {
        alert("当前浏览器不支持选择本地附件目录。建议使用 Chrome 或 Edge 打开此单机工具。");
        return;
      }
      attachmentRootHandle = await window.showDirectoryPicker({ mode: "readwrite" });
      await saveAttachmentDirectoryHandle(attachmentRootHandle);
      state.attachmentDirectoryName = attachmentRootHandle.name;
      renderAll();
    }

    function sanitizeFilePart(value) {
      return String(value || "untitled")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "untitled";
    }

    function attachmentFolderName(card) {
      return `${sanitizeFilePart(card.code || "card")}_${sanitizeFilePart(card.id)}`;
    }

    async function getCardAttachmentFolder(card, create = true) {
      if (!attachmentRootHandle) return null;
      if (!(await ensureAttachmentPermission())) return null;
      const root = await attachmentRootHandle.getDirectoryHandle(ATTACHMENT_ROOT_FOLDER, { create });
      return root.getDirectoryHandle(attachmentFolderName(card), { create });
    }

    async function getAttachmentFolderByName(folderName, create = false) {
      if (!attachmentRootHandle || !folderName) return null;
      if (!(await ensureAttachmentPermission())) return null;
      const root = await attachmentRootHandle.getDirectoryHandle(ATTACHMENT_ROOT_FOLDER, { create });
      return root.getDirectoryHandle(folderName, { create });
    }

    async function uploadAttachments(card, fileList) {
      if (!canEditCards() || !fileList.length) return;
      if (serverMode) {
        await uploadAttachmentsToServer(card, fileList);
        return;
      }
      if (!attachmentRootHandle) {
        await chooseAttachmentDirectory();
      }
      if (!attachmentRootHandle) return;
      const folder = await getCardAttachmentFolder(card, true);
      if (!folder) {
        alert("没有获得附件目录写入权限。");
        return;
      }
      for (const file of fileList) {
        const storedName = `${Date.now()}_${sanitizeFilePart(file.name)}`;
        const fileHandle = await folder.getFileHandle(storedName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(file);
        await writable.close();
        card.files.push({
          id: `file-${card.id}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: file.name,
          storedName,
          folderName: attachmentFolderName(card),
          relativePath: `${ATTACHMENT_ROOT_FOLDER}/${attachmentFolderName(card)}/${storedName}`,
          type: fileType(file.name),
          size: file.size,
          uploadedAt: new Date().toISOString(),
          legacy: false
        });
      }
      renderAll();
    }

    async function uploadAttachmentsToServer(card, fileList) {
      const form = new FormData();
      fileList.forEach((file) => form.append("files", file, file.name));
      const folderName = attachmentFolderName(card);
      try {
        const response = await fetch(`/api/upload?cardId=${encodeURIComponent(card.id)}&folderName=${encodeURIComponent(folderName)}`, {
          method: "POST",
          body: form
        });
        if (!response.ok) throw new Error(`Upload failed: ${response.status}`);
        const payload = await response.json();
        (payload.files || []).forEach((file) => {
          card.files.push({
            ...file,
            type: fileType(file.name),
            uploadedAt: new Date().toISOString()
          });
        });
        renderAll();
      } catch (error) {
        console.warn("Failed to upload attachment to server", error);
        alert("附件上传到工作站失败，请确认 server.py 正在运行。");
      }
    }

    async function deleteAttachment(card, attachmentId) {
      const attachment = card.files.find((file) => file.id === attachmentId);
      if (!attachment) return;
      if (serverMode && attachment.serverStored) {
        try {
          await fetch(`/api/attachments/${encodeURIComponent(attachment.folderName)}/${encodeURIComponent(attachment.storedName)}`, { method: "DELETE" });
        } catch (error) {
          console.warn("Failed to delete server attachment", error);
        }
        card.files = card.files.filter((file) => file.id !== attachmentId);
        renderAll();
        return;
      }
      if (!attachment.legacy && attachmentRootHandle) {
        try {
          const folder = await getAttachmentFolderByName(attachment.folderName || attachmentFolderName(card), false);
          await folder.removeEntry(attachment.storedName);
        } catch (error) {
          console.warn("Failed to delete attachment file", error);
        }
      }
      card.files = card.files.filter((file) => file.id !== attachmentId);
      renderAll();
    }

    async function deleteCardAttachmentFolder(card) {
      if (serverMode) {
        const folders = new Set((card.files || [])
          .filter((file) => file.serverStored)
          .map((file) => file.folderName || attachmentFolderName(card)));
        if (!folders.size) folders.add(attachmentFolderName(card));
        for (const folderName of folders) {
          try {
            await fetch(`/api/attachments/${encodeURIComponent(folderName)}`, { method: "DELETE" });
          } catch (error) {
            console.warn("Failed to delete server attachment folder", error);
          }
        }
        return;
      }
      if (!attachmentRootHandle) return;
      const folders = new Set((card.files || [])
        .filter((file) => !file.legacy)
        .map((file) => file.folderName || attachmentFolderName(card)));
      if (!folders.size) folders.add(attachmentFolderName(card));
      for (const folderName of folders) {
        try {
          if (!(await ensureAttachmentPermission())) return;
          const root = await attachmentRootHandle.getDirectoryHandle(ATTACHMENT_ROOT_FOLDER, { create: false });
          await root.removeEntry(folderName, { recursive: true });
        } catch (error) {
          console.warn("Failed to delete card attachment folder", error);
        }
      }
    }

    // === 图谱数据模型与查询 ==================================================
    // parentId 是卡片的主关系；edges 保存可编辑的显式连线和关系类型。
    function cardById(id) {
      return cardLookup.get(id) || state.cards.find((card) => card.id === id);
    }

    function refreshCardLookup() {
      cardLookup = new Map(state.cards.map((card) => [card.id, card]));
    }

    function partById(id) {
      return state.parts.find((part) => part.id === id);
    }

    function cardInActivePart(card) {
      return state.activePartId === "all" || card.partId === state.activePartId;
    }

    function activeScopedCard() {
      const active = cardById(state.activeCardId);
      if (active && cardInActivePart(active)) return active;
      return state.cards.find(cardInActivePart) || null;
    }

    function placedCards() {
      return state.cards.filter((card) => card.placed && cardInActivePart(card));
    }

    function graphEdges() {
      const edgeMap = new Map();
      state.edges.forEach((edge) => {
        const from = cardById(edge.from);
        const to = cardById(edge.to);
        if (!from || !to) return;
        edgeMap.set(`${edge.from}->${edge.to}`, { ...edge, synthetic: false });
      });
      state.cards.forEach((card) => {
        if (!card.parentId) return;
        const parent = cardById(card.parentId);
        if (!parent) return;
        const key = `${parent.id}->${card.id}`;
        if (!edgeMap.has(key)) {
          edgeMap.set(key, {
            id: `parent-${parent.id}-${card.id}`,
            from: parent.id,
            to: card.id,
            type: card.relationType || "结构迭代",
            synthetic: true
          });
        }
      });
      return Array.from(edgeMap.values());
    }

    function scopedGraphEdges() {
      return graphEdges().filter((edge) => {
        const from = cardById(edge.from);
        const to = cardById(edge.to);
        return from?.placed && to?.placed && cardInActivePart(from) && cardInActivePart(to);
      });
    }

    function childIdMap(edges) {
      const map = new Map();
      edges.forEach((edge) => {
        if (!map.has(edge.from)) map.set(edge.from, []);
        map.get(edge.from).push(edge.to);
      });
      return map;
    }

    function canEditGraph() {
      return state.role !== "structure";
    }

    function canEditCards() {
      return state.role !== "structure";
    }

    function numericValue(card, code) {
      const value = Number(card.values?.[code]);
      return Number.isFinite(value) ? value : 0;
    }

    function fieldValue(card, field) {
      const value = card.values?.[field.code];
      if (value === undefined || value === null || value === "") return "—";
      if (field.type === "number") {
        const number = Number(value);
        if (!Number.isFinite(number)) return "—";
        const decimals = Math.abs(number) >= 100 || Number.isInteger(number) ? 0 : 2;
        return `${number.toFixed(decimals).replace(/\.?0+$/, "")}${field.unit || ""}`;
      }
      return String(value);
    }

    function isKeyMetricField(field) {
      if (field.type !== "number") return false;
      if (Object.prototype.hasOwnProperty.call(field, "keyMetric")) return Boolean(field.keyMetric);
      return ["first", "second", "third", "mass", "stiffness"].includes(field.code);
    }

    function isConclusionField(field) {
      if (Object.prototype.hasOwnProperty.call(field, "conclusionField")) return Boolean(field.conclusionField);
      return ["conclusion", "constraint", "solver", "conclusionStatus", "suggestion", "risk"].includes(field.code);
    }

    function isDetailSummaryField(field) {
      if (Object.prototype.hasOwnProperty.call(field, "detailSummary")) return Boolean(field.detailSummary);
      return Boolean(field.showOnNode);
    }

    function primaryConclusionText(card) {
      const conclusionField = state.template.fields.find((field) => field.code === "conclusion" && isConclusionField(field))
        || state.template.fields.find(isConclusionField);
      if (!conclusionField) return "模板未配置结果结论字段";
      const value = card.values?.[conclusionField.code];
      return value === undefined || value === null || value === "" ? "未填写结果结论" : String(value);
    }

    function relationOptionsHtml(selected = "结构迭代") {
      return RELATION_TYPES.map((type) => `<option value="${type}" ${selected === type ? "selected" : ""}>${type}</option>`).join("");
    }

    function parentRelationType(card) {
      if (!card?.parentId) return card?.relationType || "结构迭代";
      const explicit = state.edges.find((edge) => edge.from === card.parentId && edge.to === card.id);
      return explicit?.type || card.relationType || "结构迭代";
    }

    function deltaText(card) {
      const base = cardById("v1") || placedCards()[0];
      if (!base || card.id === base.id) return "基准";
      const baseValue = numericValue(base, "first");
      const current = numericValue(card, "first");
      if (!baseValue || !current) return "待计算";
      const delta = ((current - baseValue) / baseValue) * 100;
      return `${delta >= 0 ? "+" : ""}${delta.toFixed(1)}%`;
    }

    function nodeMatches(card, q = searchInput.value.trim().toLowerCase()) {
      const fieldText = state.template.fields.map((field) => card.values?.[field.code]).join(" ");
      const hitSearch = !q || [
        card.code,
        card.title,
        card.change,
        card.conclusion,
        card.owner,
        card.task,
        fieldText
      ].join(" ").toLowerCase().includes(q);
      const hitFilter = state.filter === "all" || card.status === state.filter;
      return hitSearch && hitFilter && cardInActivePart(card);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function statusBadge(card) {
      const meta = statusMeta[card.status] || statusMeta.done;
      return `<span class="badge ${meta.className}">${meta.text}</span>`;
    }

    // === 渲染入口 ============================================================
    // renderAll 是唯一的全量刷新入口；局部拖拽只更新节点位置和 SVG 连线。
    function renderAll() {
      refreshCardLookup();
      saveState();
      renderRoleAndMode();
      renderKpis();
      renderPartTree();
      renderLibrary();
      renderLinks();
      renderNodes();
      renderCompare();
      renderEdgeList();
      renderPanel();
    }

    function renderRoleAndMode() {
      document.querySelectorAll("[data-role]").forEach((button) => {
        button.classList.toggle("active", button.dataset.role === state.role);
      });
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === state.mode);
      });
      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === state.filter);
      });
      document.querySelectorAll("[data-panel]").forEach((button) => {
        button.classList.toggle("active", button.dataset.panel === state.panel);
      });
      document.getElementById("permissionNote").textContent = canEditGraph()
        ? state.createChildMode
          ? "新建卡片模式：点击图谱中的父卡片，在其子集中创建新卡片。"
          : "当前角色可编辑图谱和卡片内容。"
        : "结构工程师角色仅查看图谱、结果和附件元数据。";
      treeStage.classList.toggle("create-child", Boolean(state.createChildMode && canEditGraph()));
      const newCardButton = document.getElementById("newCard");
      if (newCardButton) {
        newCardButton.classList.toggle("primary-btn", !state.createChildMode);
        newCardButton.classList.toggle("ghost-btn", Boolean(state.createChildMode));
        newCardButton.textContent = state.createChildMode ? "取消新建" : "新建卡片";
      }
      treeCanvas.style.transform = `scale(${state.zoom})`;
    }

    function renderKpis() {
      const cards = placedCards();
      const scopedCards = state.cards.filter(cardInActivePart);
      const best = Math.max(0, ...scopedCards.map((card) => numericValue(card, "first")));
      document.getElementById("kpiNodes").textContent = cards.length;
      document.getElementById("kpiLibrary").textContent = scopedCards.filter((card) => !card.placed).length;
      document.getElementById("kpiBest").textContent = best ? `${best.toFixed(1)}Hz` : "待录入";
      document.getElementById("kpiRecommended").textContent = scopedCards.filter((card) => card.status === "recommended").length;
    }

    function renderPartTree() {
      const tree = document.getElementById("partTree");
      const totalCards = state.cards.length;
      const totalAttachments = state.cards.reduce((sum, card) => sum + (card.files || []).length, 0);
      const partStats = new Map(state.parts.map((part) => [part.id, { cards: 0, recommended: 0, attachments: 0 }]));
      state.cards.forEach((card) => {
        const stats = partStats.get(card.partId);
        if (!stats) return;
        stats.cards += 1;
        if (card.status === "recommended") stats.recommended += 1;
        stats.attachments += (card.files || []).length;
      });
      tree.innerHTML = `
        <button class="tree-root ${state.activePartId === "all" ? "active" : ""}" type="button" data-part-id="all">
          <span class="tree-icon">▾</span>
          <span class="tree-label"><strong>FSW 仿真数据库</strong><span>${totalCards} 张卡片 · ${totalAttachments} 个附件</span></span>
          <span class="badge gray">全部</span>
        </button>
        ${state.parts.map((part) => {
          const stats = partStats.get(part.id) || { cards: 0, recommended: 0, attachments: 0 };
          return `
            <button class="part-item ${state.activePartId === part.id ? "active" : ""}" type="button" data-part-id="${escapeHtml(part.id)}">
              <span class="tree-icon">□</span>
              <span class="tree-label"><strong>${escapeHtml(part.code)} · ${escapeHtml(part.name)}</strong><span>${escapeHtml(part.type)} · ${stats.cards} 张卡片 · ${stats.attachments} 个附件</span></span>
              <span class="badge ${stats.recommended ? "green" : "gray"}">${stats.recommended ? `${stats.recommended} 推荐` : "零件"}</span>
            </button>
          `;
        }).join("")}
      `;
      tree.querySelectorAll("[data-part-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activePartId = button.dataset.partId;
          const firstCard = state.cards.find((card) => cardInActivePart(card));
          if (firstCard) state.activeCardId = firstCard.id;
          state.createChildMode = false;
          renderAll();
        });
      });
    }

    function renderLibrary() {
      const list = document.getElementById("libraryList");
      const items = state.cards.filter((card) => !card.placed && cardInActivePart(card));
      if (!items.length) {
        list.innerHTML = `<div class="empty">卡片库为空。新建卡片后可拖入图谱画布。</div>`;
        return;
      }
      list.innerHTML = items.map((card) => `
        <article class="library-card ${card.status}" draggable="${canEditGraph()}" data-library-card="${card.id}">
          <strong>${escapeHtml(card.code)} · ${escapeHtml(card.title)}</strong>
          <p>${escapeHtml(card.change)}</p>
          <div class="node-footer">${statusBadge(card)}<span class="delta">${escapeHtml(card.owner)}</span></div>
        </article>
      `).join("");
      list.querySelectorAll("[data-library-card]").forEach((item) => {
        item.addEventListener("dragstart", (event) => {
          if (!canEditGraph()) {
            event.preventDefault();
            return;
          }
          event.dataTransfer.setData("text/plain", item.dataset.libraryCard);
          event.dataTransfer.effectAllowed = "move";
        });
        item.addEventListener("click", () => {
          state.activeCardId = item.dataset.libraryCard;
          state.panel = "edit";
          renderAll();
        });
      });
    }

    function renderLinks() {
      updateCanvasBounds();
      linkSvg.innerHTML = "";
      scopedGraphEdges().forEach((edge) => {
        const from = cardById(edge.from);
        const to = cardById(edge.to);
        const x1 = from.x + 206;
        const y1 = from.y + 63;
        const x2 = to.x;
        const y2 = to.y + 63;
        const mid = x1 + (x2 - x1) / 2;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", `link ${edge.type === "推荐路径" ? "recommended" : ""}`);
        path.setAttribute("d", `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
        linkSvg.appendChild(path);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("class", "link-label");
        label.setAttribute("x", String(mid - 18));
        label.setAttribute("y", String((y1 + y2) / 2 - 6));
        label.textContent = edge.type;
        linkSvg.appendChild(label);
      });
    }

    function updateCanvasBounds() {
      const cards = placedCards();
      const minWidth = Math.max(1500, Math.ceil(treeStage.clientWidth / Math.max(state.zoom, 0.1)) + 320);
      const minHeight = Math.max(980, Math.ceil(treeStage.clientHeight / Math.max(state.zoom, 0.1)) + 260);
      const maxX = cards.length ? Math.max(...cards.map((card) => Number(card.x) || 0)) : 0;
      const maxY = cards.length ? Math.max(...cards.map((card) => Number(card.y) || 0)) : 0;
      const width = Math.max(minWidth, Math.ceil(maxX + 206 + 420));
      const height = Math.max(minHeight, Math.ceil(maxY + 126 + 320));
      treeCanvas.style.width = `${width}px`;
      treeCanvas.style.height = `${height}px`;
      linkSvg.setAttribute("width", String(width));
      linkSvg.setAttribute("height", String(height));
      linkSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
    }

    function renderNodes() {
      nodesLayer.innerHTML = "";
      const summaryFields = state.template.fields.filter((field) => field.showOnNode).slice(0, 2);
      const selectedIds = new Set(state.selectedIds);
      const query = searchInput.value.trim().toLowerCase();
      placedCards().forEach((card) => {
        const node = document.createElement("article");
        node.className = [
          "node",
          card.status,
          card.id === state.activeCardId ? "active" : "",
          card.id === state.pendingConnectId ? "pending" : "",
          nodeMatches(card, query) ? "" : "dimmed"
        ].join(" ");
        node.style.left = `${card.x}px`;
        node.style.top = `${card.y}px`;
        node.tabIndex = 0;
        node.setAttribute("role", "button");
        node.setAttribute("aria-label", `${card.code} ${card.title}`);
        node.dataset.cardId = card.id;
        node.innerHTML = `
          <div class="node-top">
            <div>
              <div class="node-code">${escapeHtml(card.code)}</div>
              <div class="node-title">${escapeHtml(card.title)}</div>
            </div>
            <input class="node-check" type="checkbox" ${selectedIds.has(card.id) ? "checked" : ""} aria-label="加入对比">
          </div>
          <div class="metrics">
            ${summaryFields.map((field) => `
              <div class="metric"><span>${escapeHtml(field.name)}</span><strong>${escapeHtml(fieldValue(card, field))}</strong></div>
            `).join("")}
          </div>
          <div class="node-footer">
            ${statusBadge(card)}
            <span class="delta">${escapeHtml(deltaText(card))}</span>
          </div>
        `;

        node.addEventListener("click", () => {
          if (suppressedNodeClickId === card.id) {
            suppressedNodeClickId = "";
            return;
          }
          handleNodeClick(card.id);
        });
        node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            handleNodeClick(card.id);
          }
        });
        node.addEventListener("pointerdown", (event) => startNodeDrag(event, node, card));

        const checkbox = node.querySelector("input");
        checkbox.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleSelected(card.id, checkbox.checked);
        });
        nodesLayer.appendChild(node);
      });
    }

    function handleNodeClick(id) {
      if (state.createChildMode && canEditGraph()) {
        createCard(id);
        return;
      }
      if (state.mode === "connect" && canEditGraph()) {
        if (!state.pendingConnectId) {
          state.pendingConnectId = id;
        } else if (state.pendingConnectId === id) {
          state.pendingConnectId = null;
        } else {
          addEdge(state.pendingConnectId, id);
          state.pendingConnectId = null;
        }
      }
      state.activeCardId = id;
      state.panel = "detail";
      renderAll();
    }

    function startNodeDrag(event, node, card) {
      if (!canEditGraph() || state.createChildMode || state.mode !== "move" || event.target.closest("input, button, select, textarea")) return;
      event.preventDefault();
      node.setPointerCapture(event.pointerId);
      dragState = {
        id: card.id,
        startX: event.clientX,
        startY: event.clientY,
        originX: card.x,
        originY: card.y,
        moved: false
      };
      node.classList.add("dragging");
      node.addEventListener("pointermove", dragNode);
      node.addEventListener("pointerup", endNodeDrag, { once: true });
      node.addEventListener("pointercancel", endNodeDrag, { once: true });
    }

    function dragNode(event) {
      if (!dragState) return;
      const card = cardById(dragState.id);
      if (!card) return;
      const dx = (event.clientX - dragState.startX) / state.zoom;
      const dy = (event.clientY - dragState.startY) / state.zoom;
      dragState.moved = Math.abs(dx) + Math.abs(dy) > 2;
      card.x = Math.max(20, dragState.originX + dx);
      card.y = Math.max(20, dragState.originY + dy);
      const node = event.currentTarget;
      node.style.left = `${card.x}px`;
      node.style.top = `${card.y}px`;
      updateCanvasBounds();
      renderLinks();
    }

    function endNodeDrag(event) {
      const node = event.currentTarget;
      const clickedId = dragState?.id;
      const moved = Boolean(dragState?.moved);
      node.classList.remove("dragging");
      node.removeEventListener("pointermove", dragNode);
      dragState = null;
      if (moved && clickedId) {
        state.activeCardId = clickedId;
        saveState();
        renderAll();
        return;
      }
      if (clickedId && event.type === "pointerup") {
        suppressedNodeClickId = clickedId;
        setTimeout(() => {
          if (suppressedNodeClickId === clickedId) suppressedNodeClickId = "";
        }, 0);
        handleNodeClick(clickedId);
      }
    }

    function addEdge(from, to) {
      const exists = graphEdges().some((edge) => edge.from === from && edge.to === to);
      if (exists || wouldCreateCycle(from, to)) return;
      const toCard = cardById(to);
      const relationType = document.getElementById("relationType").value;
      if (toCard) {
        toCard.parentId = from;
        toCard.relationType = relationType;
      }
      state.edges.push({
        id: `e-${from}-${to}-${Date.now()}`,
        from,
        to,
        type: relationType
      });
    }

    function wouldCreateCycle(from, to) {
      const childrenByParent = childIdMap(graphEdges());
      const stack = [to];
      const visited = new Set();
      while (stack.length) {
        const current = stack.pop();
        if (current === from) return true;
        if (visited.has(current)) continue;
        visited.add(current);
        (childrenByParent.get(current) || []).forEach((childId) => stack.push(childId));
      }
      return false;
    }

    function toggleSelected(id, checked) {
      const set = new Set(state.selectedIds);
      if (checked) set.add(id);
      else set.delete(id);
      state.selectedIds = Array.from(set);
      renderAll();
    }

    function renderCompare() {
      const fields = state.template.fields.filter((field) => field.compare);

      compareTable.innerHTML = `

          <thead>

              <th>来源</th>
              ${fields.map((field) => `<th class="${field.type === "number" ? "num" : ""}">${escapeHtml(field.name)}</th>`).join("")}
              <th>状态</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((card) => {

                  <td>${parent ? escapeHtml(parent.code) : "基准"}</td>

                    const isBest = field.code === "first" && numericValue(card, "first") === bestFirst && bestFirst > 0;
                    return `<td class="${field.type === "number" ? "num" : ""}">${escapeHtml(fieldValue(card, field))}${isBest ? " ↑" : ""}</td>`;
                  }).join("")}
                  <td>${statusBadge(card)}</td>

    function renderEdgeList() {
      const list = document.getElementById("edgeList");
      const active = activeScopedCard();
      if (!active) {
        list.innerHTML = `<div class="empty">当前零件还没有选中的卡片。</div>`;
        return;
      }
      const edges = scopedGraphEdges().filter((edge) => edge.from === active.id || edge.to === active.id);
      if (!edges.length) {
        list.innerHTML = `<div class="empty">当前卡片暂无连接关系。点击“新建卡片”创建后续节点，或切换到连线模式连接其他卡片。</div>`;
        return;
      }
      list.innerHTML = edges.map((edge) => {
        const from = cardById(edge.from);
        const to = cardById(edge.to);
        const direction = edge.from === active.id ? "后续" : "来源";
        return `
          <div class="mini-row">
            <strong>${escapeHtml(direction)}：${escapeHtml(from?.code || edge.from)} → ${escapeHtml(to?.code || edge.to)}</strong>
            ${canEditGraph()
              ? `<select data-edge-type="${edge.id}" aria-label="编辑关系类型">${relationOptionsHtml(edge.type)}</select>`
              : `<span>${escapeHtml(edge.type)}</span>`}
            ${canEditGraph() ? `<button class="icon-btn" type="button" data-delete-edge="${edge.id}" title="删除关系">×</button>` : ""}
          </div>
        `;
      }).join("");
      list.querySelectorAll("[data-edge-type]").forEach((select) => {
        select.addEventListener("change", () => {
          const edge = edges.find((item) => item.id === select.dataset.edgeType);
          if (!edge) return;
          updateEdgeType(edge, select.value);
          renderAll();
        });
      });
      list.querySelectorAll("[data-delete-edge]").forEach((button) => {
        button.addEventListener("click", () => {
          const edge = edges.find((item) => item.id === button.dataset.deleteEdge);
          if (edge) deleteGraphEdge(edge);
          renderAll();
        });
      });
    }

    function updateEdgeType(edge, type) {
      const to = cardById(edge.to);
      if (to) to.relationType = type;
      const explicit = state.edges.find((item) => item.from === edge.from && item.to === edge.to);
      if (explicit) {
        explicit.type = type;
      } else {
        state.edges.push({
          id: `e-${edge.from}-${edge.to}-${Date.now()}`,
          from: edge.from,
          to: edge.to,
          type
        });
      }
    }

    function deleteGraphEdge(edge) {
      const to = cardById(edge.to);
      if (to && to.parentId === edge.from) {
        to.parentId = "";
      }
      state.edges = state.edges.filter((item) => item.id !== edge.id && !(item.from === edge.from && item.to === edge.to));
    }

    function attachmentName(file) {
      return typeof file === "string" ? file : file?.name || "未命名附件";
    }

    function attachmentTitleHtml(file) {
      const name = escapeHtml(attachmentName(file));
      if (file && typeof file === "object" && file.url) {
        return `<a href="${escapeHtml(file.url)}" target="_blank" rel="noopener">${name}</a>`;
      }
      return name;
    }

    function attachmentMetaText(file) {
      const item = typeof file === "string" ? normalizeAttachment(file, { id: "legacy" }, 0) : file;
      const size = item.size ? ` · ${formatBytes(item.size)}` : "";
      const path = item.relativePath ? ` · ${item.relativePath}` : item.legacy ? " · 示例元数据" : "";
      return `${item.type || fileType(item.name)}${size}${path}`;
    }

    function attachmentStorageStatus() {
      if (serverMode) {
        return "服务器模式：附件统一保存到工作站 server_data/attachments，可供局域网用户访问。";
      }
      if (!("showDirectoryPicker" in window)) {
        return "当前浏览器不支持本地目录归档；请使用 Chrome 或 Edge 试用真实附件保存。";
      }
      if (!attachmentRootHandle) {
        return "尚未选择附件目录。上传前请选择一个本地目录，系统会在其中创建 simulation-attachments。";
      }
      return `附件目录：${state.attachmentDirectoryName || attachmentRootHandle.name} / ${ATTACHMENT_ROOT_FOLDER}`;
    }

    function formatBytes(bytes) {
      const value = Number(bytes);
      if (!value) return "";
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
      return `${(value / 1024 / 1024 / 1024).toFixed(1)} GB`;
    }

    function fileType(file) {
      const lower = attachmentName(file).toLowerCase();
      if (lower.endsWith(".step") || lower.endsWith(".catpart") || lower.endsWith(".catproduct")) return "数模";
      if (lower.endsWith(".pdf") || lower.endsWith(".docx") || lower.endsWith(".pptx")) return "报告";
      if (lower.endsWith(".png") || lower.endsWith(".jpg") || lower.endsWith(".mp4")) return "图片/动画";
      if (lower.endsWith(".xlsx") || lower.endsWith(".xls") || lower.endsWith(".csv") || lower.endsWith(".rpt") || lower.endsWith(".dat")) return "数据";
      if (lower.endsWith(".odb") || lower.endsWith(".inp") || lower.endsWith(".cae") || lower.endsWith(".hm") || lower.endsWith(".fem")) return "求解/前处理";
      if (lower.endsWith(".zip") || lower.endsWith(".7z") || lower.endsWith(".rar")) return "压缩包";
      return "结果文件";
    }
