      });
      document.getElementById("deleteCard").addEventListener("click", async () => {
        if (!canEditCards()) return;
        await deleteCardAttachmentFolder(card);
        state.cards = state.cards.filter((item) => item.id !== card.id);
        state.edges = state.edges.filter((edge) => edge.from !== card.id && edge.to !== card.id);
        state.selectedIds = state.selectedIds.filter((id) => id !== card.id);
        state.activeCardId = state.cards[0]?.id || "";
        renderAll();
      });
      document.getElementById("pickAttachmentDir").addEventListener("click", async () => {
        if (!canEditCards()) return;
        await chooseAttachmentDirectory();
      });
      document.getElementById("cardFileInput").addEventListener("change", async (event) => {
        await uploadAttachments(card, Array.from(event.target.files || []));
        event.target.value = "";
      });
      detailBody.querySelectorAll("[data-delete-attachment]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!canEditCards()) return;
          await deleteAttachment(card, button.dataset.deleteAttachment);
        });
      });
    }

    function syncParentEdge(card, previousParentId = "", previousRelationType = "结构迭代") {
      const nextParentId = card.parentId;
      const previousEdges = state.edges.filter((edge) => edge.to === card.id);
      const existingRelation = state.edges.find((edge) => edge.to === card.id && edge.from === nextParentId);
      const relationType = card.relationType || existingRelation?.type || "结构迭代";
      if (!nextParentId) {
        state.edges = state.edges.filter((edge) => edge.to !== card.id);
        return;
      }
      // 先校验环路，再删除旧边；否则非法来源会把原关系丢掉。
      if (wouldCreateCycle(nextParentId, card.id)) {
        const previousEdge = previousEdges[0];
        card.parentId = previousParentId || previousEdge?.from || "";
        card.relationType = previousRelationType || previousEdge?.type || card.relationType || "结构迭代";
        alert("不能把来源卡片设置为当前卡片的下游节点。");
        return;
      }
      state.edges = state.edges.filter((edge) => edge.to !== card.id);
      if (card.placed && cardById(nextParentId)?.placed) {
        state.edges.push({
          id: existingRelation?.id || `e-${nextParentId}-${card.id}-${Date.now()}`,
          from: nextParentId,
          to: card.id,
          type: relationType
        });
      }
    }

    function getTemplateDraft() {
      if (!templateDraft) {
        templateDraft = {
          name: state.template.name,
          fields: state.template.fields.map((field) => ({
            ...clone(field),
            keyMetric: isKeyMetricField(field),
            conclusionField: isConclusionField(field),
            detailSummary: isDetailSummaryField(field),
            originalCode: field.code
          }))
        };
      }
      return templateDraft;
    }

    // 模板保存会迁移每张卡片的 values；字段编码是迁移和导入导出的稳定键。
    function defaultFieldValue(field) {
      return field.type === "number" ? 0 : "";
    }

    function applyTemplateDraft() {
      const draft = getTemplateDraft();
      const fields = draft.fields
        .map((field) => ({
          code: String(field.code || "").trim(),
          name: String(field.name || "").trim(),
          type: field.type === "text" ? "text" : "number",
          unit: String(field.unit || "").trim(),
          required: Boolean(field.required),
          showOnNode: Boolean(field.showOnNode),
          detailSummary: Boolean(field.detailSummary),
          compare: Boolean(field.compare),
          keyMetric: field.type === "number" && Boolean(field.keyMetric),
          conclusionField: Boolean(field.conclusionField),
          originalCode: field.originalCode || field.code
        }))
        .filter((field) => field.code && field.name);
      const duplicateCode = fields.find((field, index) => fields.findIndex((item) => item.code === field.code) !== index);
      if (duplicateCode) {
        alert(`字段编码不能重复：${duplicateCode.code}`);
        return false;
      }
      const nextCodes = new Set(fields.map((field) => field.code));
      state.cards.forEach((card) => {
        card.values = card.values || {};
        fields.forEach((field) => {
          const oldCode = field.originalCode;
          if (oldCode && oldCode !== field.code && Object.prototype.hasOwnProperty.call(card.values, oldCode)) {
            if (!Object.prototype.hasOwnProperty.call(card.values, field.code)) {
              card.values[field.code] = card.values[oldCode];
            }
            delete card.values[oldCode];
          }
          if (!Object.prototype.hasOwnProperty.call(card.values, field.code)) {
            card.values[field.code] = defaultFieldValue(field);
          }
        });
        state.template.fields.forEach((oldField) => {
          const stillExists = fields.some((field) => field.originalCode === oldField.code || field.code === oldField.code);
          if (!stillExists && !nextCodes.has(oldField.code)) {
            delete card.values[oldField.code];
          }
        });
      });
      state.template = {
        name: draft.name || "仿真结果卡片",
        fields: fields.map(({ originalCode, ...field }) => field)
      };
      templateDraft = null;
      return true;
    }

    // === 模板面板渲染与保存 ==================================================
    function renderTemplatePanel() {
      const disabled = canEditCards() ? "" : "disabled";
      const draft = getTemplateDraft();
      detailBody.innerHTML = `
        <section class="detail-section">
          <div class="selected-heading">
            <div>
              <h3>${escapeHtml(draft.name)}</h3>
              <p>模板字段决定卡片编辑表单、节点摘要和对比表字段。修改后需保存才会应用到卡片。</p>
            </div>
          </div>
          <div class="field full">
            <label for="templateName">模板名称</label>
            <input id="templateName" value="${escapeHtml(draft.name)}" ${disabled}>
          </div>
          <table class="template-table">
            <thead>
              <tr>
                <th>字段名</th>
                <th>编码</th>
                <th>类型</th>
                <th>单位</th>
                <th>必填</th>
                <th>节点摘要</th>
                <th>详情摘要</th>
                <th>对比</th>
                <th>关键数值</th>
                <th>结论内容</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${draft.fields.map((field, index) => `
                <tr>
                  <td><input value="${escapeHtml(field.name)}" data-field-index="${index}" data-field-prop="name" ${disabled}></td>
                  <td><input value="${escapeHtml(field.code)}" data-field-index="${index}" data-field-prop="code" ${disabled}></td>
                  <td>
                    <select data-field-index="${index}" data-field-prop="type" ${disabled}>
                      <option value="number" ${field.type === "number" ? "selected" : ""}>数字</option>
                      <option value="text" ${field.type === "text" ? "selected" : ""}>文本</option>
                    </select>
                  </td>
                  <td><input value="${escapeHtml(field.unit || "")}" data-field-index="${index}" data-field-prop="unit" ${disabled}></td>
                  <td><input type="checkbox" ${field.required ? "checked" : ""} data-field-index="${index}" data-field-prop="required" ${disabled}></td>
                  <td><input type="checkbox" ${field.showOnNode ? "checked" : ""} data-field-index="${index}" data-field-prop="showOnNode" ${disabled}></td>
                  <td><input type="checkbox" ${isDetailSummaryField(field) ? "checked" : ""} data-field-index="${index}" data-field-prop="detailSummary" ${disabled}></td>
                  <td><input type="checkbox" ${field.compare ? "checked" : ""} data-field-index="${index}" data-field-prop="compare" ${disabled}></td>
                  <td><input type="checkbox" ${isKeyMetricField(field) ? "checked" : ""} data-field-index="${index}" data-field-prop="keyMetric" ${field.type === "number" ? disabled : "disabled"}></td>
                  <td><input type="checkbox" ${isConclusionField(field) ? "checked" : ""} data-field-index="${index}" data-field-prop="conclusionField" ${disabled}></td>
                  <td><button class="icon-btn" type="button" data-delete-field="${index}" ${disabled} title="删除字段">×</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>

        <section class="detail-section">
          <h4>新增字段</h4>
          <form id="fieldForm" class="form-grid">
            <div class="field">
              <label for="newFieldName">字段名</label>
              <input id="newFieldName" name="name" placeholder="最大应力" ${disabled}>
            </div>
            <div class="field">
              <label for="newFieldCode">字段编码</label>
              <input id="newFieldCode" name="code" placeholder="maxStress" ${disabled}>
            </div>
            <div class="field">
              <label for="newFieldType">类型</label>
              <select id="newFieldType" name="type" ${disabled}>
                <option value="number">数字</option>
                <option value="text">文本</option>
              </select>
            </div>
            <div class="field">
              <label for="newFieldUnit">单位</label>
              <input id="newFieldUnit" name="unit" placeholder="MPa" ${disabled}>
            </div>
            <div class="field full">
              <button class="primary-btn" type="submit" ${disabled}>添加字段</button>
            </div>
          </form>
        </section>

        <section class="detail-section">
          <div class="button-row">
            <button class="primary-btn" id="saveTemplate" type="button" ${disabled}>保存模板</button>
            <button class="ghost-btn" id="discardTemplate" type="button" ${disabled}>放弃修改</button>
          </div>
        </section>

        <section class="detail-section">
          <button class="danger-btn" id="resetData" type="button" ${disabled}>恢复示例数据</button>
        </section>
      `;
      document.getElementById("templateName").addEventListener("input", (event) => {
        if (!canEditCards()) return;
        draft.name = event.target.value.trim();
      });
      detailBody.querySelectorAll("[data-field-prop]").forEach((input) => {
        const updateDraftField = () => {
          if (!canEditCards()) return;
          const field = draft.fields[Number(input.dataset.fieldIndex)];
          const prop = input.dataset.fieldProp;
          const nextValue = input.type === "checkbox" ? input.checked : input.value.trim();
          field[prop] = nextValue;
        };
        input.addEventListener("input", updateDraftField);
        input.addEventListener("change", updateDraftField);
      });
      detailBody.querySelectorAll("[data-delete-field]").forEach((button) => {
        button.addEventListener("click", () => {
          if (!canEditCards()) return;
          draft.fields.splice(Number(button.dataset.deleteField), 1);
          renderTemplatePanel();
        });
      });
      document.getElementById("fieldForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!canEditCards()) return;
        const data = new FormData(event.currentTarget);
        const name = data.get("name").trim();
        const code = data.get("code").trim();
        if (!name || !code || draft.fields.some((field) => field.code === code)) return;
        draft.fields.push({
          name,
          code,
          type: data.get("type"),
          unit: data.get("unit").trim(),
          required: false,
          showOnNode: false,
          detailSummary: false,
          compare: true,
          keyMetric: data.get("type") === "number",
          conclusionField: data.get("type") === "text",
          originalCode: ""
        });
        renderTemplatePanel();
      });
      document.getElementById("saveTemplate").addEventListener("click", () => {
        if (!canEditCards()) return;
        if (applyTemplateDraft()) renderAll();
      });
      document.getElementById("discardTemplate").addEventListener("click", () => {
        templateDraft = null;
        renderAll();
      });
      document.getElementById("resetData").addEventListener("click", () => {
        state = normalizedDefaultState();
        if (!state.parts?.length) state.parts = clone(defaultState.parts);
        state.activePartId = "all";
        state.createChildMode = false;
        templateDraft = null;
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
      });
    }

    // === 业务动作：卡片、零件、布局 =========================================
    function duplicateCard(id) {
      if (!canEditCards()) return;
      const source = cardById(id);
      if (!source) return;
      const copy = clone(source);
      copy.id = `card-${Date.now()}`;
      copy.code = `${source.code}-COPY`;
      copy.title = `${source.title} 副本`;
      copy.status = "running";
      copy.placed = false;
      copy.parentId = source.id;
      copy.relationType = "结构迭代";
      copy.x = source.x + 280;
      copy.y = source.y + 40;
      copy.files = [];
      state.cards.push(copy);
      state.activeCardId = copy.id;
      state.panel = "edit";
      renderAll();
    }

    function createCard(parentId = state.activeCardId) {
      if (!canEditCards()) return;
      const id = `card-${Date.now()}`;
      const values = {};
      state.template.fields.forEach((field) => {
        values[field.code] = field.type === "number" ? 0 : "";
      });
      const parent = cardById(parentId);
      const siblingCount = parent ? state.cards.filter((item) => item.parentId === parent.id && item.placed).length : 0;
      const partId = parent?.partId || (state.activePartId !== "all" ? state.activePartId : state.parts[0]?.id || "part-steering");
      const card = {
        id,
        parentId: parent?.id || "",
        partId,
        relationType: "结构迭代",
        code: `NEW-${state.cards.length + 1}`,
        title: "新仿真结果卡片",
        status: "running",
        owner: "待分配",
        task: "",
        model: "",
        report: "",
        placed: Boolean(parent?.placed),
        x: parent?.placed ? parent.x + 360 : 940,
        y: parent?.placed ? Math.max(20, parent.y + siblingCount * 190) : 300,
        values,
        change: "填写结构变更说明。",
        conclusion: "填写仿真结论。",
        files: []
      };
      state.cards.push(card);
      syncParentEdge(card);
      state.activeCardId = id;
      state.panel = "edit";
      state.createChildMode = false;
      renderAll();
    }

    function createPart() {
      if (!canEditCards()) return;
      const name = window.prompt("请输入仿真零件名称", `新仿真零件 ${state.parts.length + 1}`);
      if (!name || !name.trim()) return;
      const code = window.prompt("请输入零件编号", `PART-${String(state.parts.length + 1).padStart(2, "0")}`) || `PART-${state.parts.length + 1}`;
      const part = {
        id: `part-${Date.now()}`,
        code: code.trim(),
        name: name.trim(),
        type: "零件",
        owner: "未设置"
      };
      state.parts.push(part);
      state.activePartId = part.id;
      state.createChildMode = false;
      renderAll();
    }

    function autoLayout() {
      if (!canEditGraph()) return;
      const cards = placedCards();
      const edges = graphEdges();
      const childrenByParent = childIdMap(edges);
      const roots = cards.filter((card) => !card.parentId || !cardById(card.parentId)?.placed);
      const levels = new Map();
      const visited = new Set();
      const visit = (card, level) => {
        if (visited.has(card.id)) return;
        visited.add(card.id);
        if (!levels.has(level)) levels.set(level, []);
        if (!levels.get(level).includes(card)) levels.get(level).push(card);
        (childrenByParent.get(card.id) || [])
          .map((childId) => cardById(childId))
          .filter((child) => child && cardInActivePart(child))
          .forEach((child) => visit(child, level + 1));
      };
      roots.forEach((root) => visit(root, 0));
      cards.filter((card) => !visited.has(card.id)).forEach((card) => visit(card, 0));
      levels.forEach((cards, level) => {
        cards.forEach((card, index) => {
          card.x = 70 + level * 370;
          card.y = 80 + index * 210;
        });
      });
      updateCanvasBounds();
      renderAll();
    }

    // === DOM 事件绑定 ========================================================
    treeStage.addEventListener("dragover", (event) => {
      if (!canEditGraph()) return;
      event.preventDefault();
      treeStage.classList.add("drop-ready");
    });

    treeStage.addEventListener("dragleave", () => {
      treeStage.classList.remove("drop-ready");
    });

    treeStage.addEventListener("drop", (event) => {
      if (!canEditGraph()) return;
      event.preventDefault();
      treeStage.classList.remove("drop-ready");
      const id = event.dataTransfer.getData("text/plain");
      const card = cardById(id);
      if (!card) return;
      const rect = treeCanvas.getBoundingClientRect();
      card.x = Math.max(20, (event.clientX - rect.left) / state.zoom);
      card.y = Math.max(20, (event.clientY - rect.top) / state.zoom);
      card.placed = true;
      state.activeCardId = id;
      syncParentEdge(card);
      renderAll();
    });

    document.querySelectorAll("[data-role]").forEach((button) => {
      button.addEventListener("click", () => {
        state.role = button.dataset.role;
        if (!canEditGraph()) {
          state.mode = "move";
          state.pendingConnectId = null;
          state.createChildMode = false;
        }
        renderAll();
      });
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        if (!canEditGraph()) return;
        state.mode = button.dataset.mode;
        state.pendingConnectId = null;
        state.createChildMode = false;
        renderAll();
      });
    });

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        state.filter = button.dataset.filter;
        renderAll();
      });
    });

    document.querySelectorAll("[data-panel]").forEach((button) => {
      button.addEventListener("click", () => {
        state.panel = button.dataset.panel;
        renderAll();
      });
    });

    searchInput.addEventListener("input", () => {
      renderNodes();
    });

    document.getElementById("newPart").addEventListener("click", createPart);
    document.getElementById("newCard").addEventListener("click", () => {
      if (!canEditCards()) return;
      if (!placedCards().length) {
        createCard("");
        return;
      }
      state.createChildMode = !state.createChildMode;
      if (state.createChildMode) {
        state.mode = "move";
        state.pendingConnectId = null;
      }
      renderAll();
    });
    document.getElementById("autoLayout").addEventListener("click", autoLayout);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && state.createChildMode) {
        state.createChildMode = false;
        renderAll();
      }
    });

    window.addEventListener("resize", () => {
      updateCanvasBounds();
      renderLinks();
    });

    document.getElementById("clearCompare").addEventListener("click", () => {
      state.selectedIds = [];
      renderAll();
    });

    document.getElementById("copyCompare").addEventListener("click", async () => {
      const selectedIds = new Set(state.selectedIds);
      const rows = state.cards.filter((card) => selectedIds.has(card.id) && cardInActivePart(card));
      const fields = state.template.fields.filter((field) => field.compare);
      const text = [
        ["卡片", "来源", ...fields.map((field) => field.name), "状态"].join("\t"),
        ...rows.map((card) => {
          const parent = card.parentId ? cardById(card.parentId)?.code || "" : "基准";
          return [card.code, parent, ...fields.map((field) => fieldValue(card, field)), statusMeta[card.status]?.text || card.status].join("\t");
        })
      ].join("\n");
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        console.warn("Clipboard unavailable", error);
      }
    });

    document.getElementById("zoomIn").addEventListener("click", () => {
      state.zoom = Math.min(1.3, Number((state.zoom + 0.1).toFixed(2)));
      renderAll();
    });

    document.getElementById("zoomOut").addEventListener("click", () => {
      state.zoom = Math.max(0.7, Number((state.zoom - 0.1).toFixed(2)));
      renderAll();
    });

    document.getElementById("resetView").addEventListener("click", () => {
      state.zoom = 1;
      treeStage.scrollTo({ left: 0, top: 0, behavior: "smooth" });
      renderAll();
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "simulation-graph-data.json";
      link.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importData").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (Array.isArray(imported.cards) && Array.isArray(imported.edges)) {
          state = { ...clone(defaultState), ...imported };
          state.template = normalizeTemplate(state.template);
          if (!state.parts?.length) state.parts = clone(defaultState.parts);
          if (!state.activePartId) state.activePartId = "all";
          state.cards = state.cards.map(normalizeCardRecord);
          state.mode = "move";
          state.pendingConnectId = null;
          state.createChildMode = false;
          templateDraft = null;
          renderAll();
        }
      } catch (error) {
        console.warn("Import failed", error);
      } finally {
        event.target.value = "";
      }
    });

    // === 应用启动 ============================================================
    async function initializeApp() {
      if (serverMode) {
        const loadedFromServer = await loadStateFromServer();
        if (!loadedFromServer) {
          serverMode = false;
          state = loadState();
        }
      }
      if (!serverMode) await loadAttachmentDirectoryHandle();
      renderAll();
    }

    initializeApp();
  </script>
</body>
</html>
